services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pricetracker
      POSTGRES_PASSWORD: pricetracker
      POSTGRES_DB: pricetracker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build: ./airflow
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    environment: &airflow-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pricetracker:pricetracker@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
      # Airflow 3 Task SDK: tasks report results back to the API server
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      # Log serving hostname
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_HOST: airflow-scheduler
      # Ensure include dir is on PYTHONPATH so DAGs can import scraper.*
      PYTHONPATH: /opt/airflow/include
      # Passed to DAGs for app DB / Redis access
      PRICETRACKER_DB_CONN: postgresql://pricetracker:pricetracker@postgres:5432/pricetracker
      PRICETRACKER_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

  airflow-api-server:
    build: ./airflow
    command: airflow api-server --host 0.0.0.0 --port 8080
    environment:
      <<: *airflow-env
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v2/version || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  airflow-dag-processor:
    build: ./airflow
    command: airflow dag-processor
    environment:
      <<: *airflow-env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  airflow-scheduler:
    build: ./airflow
    command: airflow scheduler
    environment:
      <<: *airflow-env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://pricetracker:pricetracker@postgres:5432/pricetracker
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
